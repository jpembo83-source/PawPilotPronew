<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale + user-scalable=no: this ships inside a native app shell,
         where pinch-zoom is never expected UI. It also stops iOS auto-zooming
         when a sub-16px input is focused — the zoomed-in page is what made the
         whole app pannable sideways. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4F3EF" media="(prefers-color-scheme: light)" />
    <!-- Neutral default — replaced at runtime with the business's name (applyBranding). -->
    <title>Pet Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fraunces: warm editorial display serif. Inter: clean body sans. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
