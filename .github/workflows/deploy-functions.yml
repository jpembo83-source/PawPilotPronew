name: Deploy Edge Functions

# Deploys the make-server edge function to the matching Supabase project:
#   push to `staging` -> staging project (ihdbnwlmqhsrslstbbqn)
#   push to `main`    -> prod project    (ruahrxkfgfyshuxykiay)
#
# Requires a repo secret SUPABASE_ACCESS_TOKEN (Supabase account -> Access
# Tokens). The Supabase CLI bundles the function directory (including the
# shared ../server code) from disk, so no manual file wiring is needed.

on:
  push:
    branches: [main, staging]
    paths:
      - 'PawPilotPro/project/supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Which environment to deploy to
        type: choice
        options: [staging, production]
        default: staging

jobs:
  deploy:
    name: Deploy make-server-fc003b23
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Resolve target project ref
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.event.inputs.target }}" = "production" ]; then
            echo "ref=ruahrxkfgfyshuxykiay" >> "$GITHUB_OUTPUT"
            echo "Deploying to PRODUCTION (ruahrxkfgfyshuxykiay)"
          else
            echo "ref=ihdbnwlmqhsrslstbbqn" >> "$GITHUB_OUTPUT"
            echo "Deploying to STAGING (ihdbnwlmqhsrslstbbqn)"
          fi
      - name: Guard against missing token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
      - name: Deploy function
        working-directory: PawPilotPro/project
        run: supabase functions deploy make-server-fc003b23 --project-ref ${{ steps.target.outputs.ref }}
