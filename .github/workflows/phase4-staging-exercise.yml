# Phase 4 / Customers — staging exercises (stage 2 dual-write, stage 3 read
# cutover).
#
# Drives the deployed staging edge function through real flows and asserts
# KV↔Postgres parity (see the scripts). Dispatch picks the exercise:
#   * readcutover (default) — captures every list/detail/search response with
#     the read_from_pg:customers flag OFF then ON and deep-compares the pairs;
#     leaves the flag ON with shadow sampling at 0.2. Data-preserving.
#   * dualwrite — the stage-2 CRUD exercise. WARNING: ends with the cascade
#     delete + clear-timeline flows, which wipe the staging tenant's customer
#     activities/notes/flags — only run it on a staging tenant you are happy
#     to clear.
#
# NO stored credentials: the existing SUPABASE_ACCESS_TOKEN secret fetches the
# staging service-role key at runtime, the scripts mint a random throwaway
# staff user for the run and delete it afterwards. The anon key below is a
# public client key by design.
name: Phase 4 staging dual-write exercise

on:
  push:
    branches: [staging]
    paths:
      - 'PawPilotPro/project/scripts/phase4/exercise-customers-dualwrite.mjs'
      - '.github/workflows/phase4-staging-exercise.yml'
  workflow_dispatch:
    inputs:
      exercise:
        description: Which exercise to run
        type: choice
        options: [readcutover, dualwrite]
        default: readcutover
      leave_flag:
        description: readcutover only — leave read_from_pg:customers on or off
        type: choice
        options: ['on', 'off']
        default: 'on'

jobs:
  exercise:
    name: Exercise customer flows on staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run exercise
        env:
          STAGING_URL: https://ihdbnwlmqhsrslstbbqn.supabase.co
          STAGING_REF: ihdbnwlmqhsrslstbbqn
          STAGING_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZGJud2xtcWhzcnNsc3RiYnFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTA0MzAsImV4cCI6MjA5Nzk2NjQzMH0.FExedDEbLu1ZGDJ__NLlnSPVjqz1rnLJdmnDwHK9bTA
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          LEAVE_FLAG: ${{ github.event.inputs.leave_flag || 'on' }}
        run: |
          if [ "${{ github.event.inputs.exercise || 'readcutover' }}" = "dualwrite" ]; then
            node PawPilotPro/project/scripts/phase4/exercise-customers-dualwrite.mjs
          else
            node PawPilotPro/project/scripts/phase4/exercise-customers-readcutover.mjs
          fi
